name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1091 -x
        with:
          scandir: .
          severity: warning

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt
      - name: Check shell formatting
        run: |
          shfmt -d -i 4 -ci -bn $(find . -type f \( -name '*.sh' -o -name '*.bash' \) -not -path './.git/*')

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - dockerfiles/docker-registry-proxy/Dockerfile
          - dockerfiles/helm-controller/Dockerfile
          - dockerfiles/kind-node/Dockerfile
          - dockerfiles/kustomize-controller/Dockerfile
          - dockerfiles/notification-controller/Dockerfile
          - dockerfiles/podinfo/Dockerfile
          - dockerfiles/source-controller/Dockerfile
          - fullstack-demo/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Lint ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: warning

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install --user yamllint
      - name: Run yamllint
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 200}, document-start: disable, truthy: {check-keys: false}, indentation: {indent-sequences: whatever}}}" \
            $(git ls-files '*.yml' '*.yaml')

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !**/node_modules/**

  python-lint:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: fullstack-demo

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  versions-env:
    name: versions.env sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all variables are set
        run: |
          set -e
          # shellcheck disable=SC1091
          source ./versions.env
          # Variables that are intentionally allowed to be empty
          ALLOW_EMPTY="EXTRA_CA_CERT"
          missing=0
          while IFS='=' read -r key _; do
            [[ -z "$key" || "$key" =~ ^# ]] && continue
            key="${key#export }"
            key="${key// /}"
            [[ -z "$key" ]] && continue
            # Skip variables that are allowed to be empty
            [[ " $ALLOW_EMPTY " == *" $key "* ]] && continue
            if [[ -z "${!key:-}" ]]; then
              echo "::error file=versions.env::Variable '$key' is empty"
              missing=$((missing + 1))
            fi
          done < <(grep -E '^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*=' versions.env)
          if [[ $missing -gt 0 ]]; then
            echo "Found $missing empty variable(s) in versions.env"
            exit 1
          fi
