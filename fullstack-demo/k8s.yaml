apiVersion: v1
kind: ServiceAccount
metadata:
  name: fullstack-demo
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullstack-demo
  labels:
    app: fullstack-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fullstack-demo
  template:
    metadata:
      labels:
        app: fullstack-demo
    spec:
      serviceAccountName: fullstack-demo
      containers:
      - name: app
        image: localhost:5001/fullstack-demo:latest
        imagePullPolicy: Always
        env:
        - name: POSTGRES_HOST
          value: "postgres-rw.postgres.svc.cluster.local"
        - name: POSTGRES_DB
          value: "app"
        - name: POSTGRES_USER
          value: "app"
        - name: POSTGRES_PASSWORD
          value: "REPLACE_WITH_PG_PASSWORD"
        - name: MONGO_URI
          value: "mongodb://app:app@mongodb.mongodb.svc.cluster.local:27017/app?authSource=app"
        - name: REDIS_HOST
          value: "valkey-primary.valkey.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          value: "valkey"
        - name: S3_ENDPOINT
          value: "http://seaweedfs-filer.seaweedfs.svc.cluster.local:8333"
        - name: S3_ACCESS_KEY
          value: "admin"
        - name: S3_SECRET_KEY
          value: "admin"
        - name: S3_BUCKET
          value: "demo-bucket"
        - name: OPENBAO_ADDR
          value: "http://openbao.openbao.svc.cluster.local:8200"
        - name: OPENBAO_ROLE
          value: "demo-app"
        ports:
        - containerPort: 8000
        volumeMounts: []
      volumes: []
---
apiVersion: v1
kind: Service
metadata:
  name: fullstack-demo
spec:
  selector:
    app: fullstack-demo
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fullstack-demo
spec:
  ingressClassName: cilium
  rules:
  - host: fullstack-demo.k8s.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fullstack-demo
            port:
              number: 80
